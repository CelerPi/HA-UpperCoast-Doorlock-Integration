# 云海湾门禁：HomePod 播报 + Siri 开门独立自动化 package
#
# 使用方法：
# 1. 将本文件复制到 HA 配置目录，例如 /config/packages/vds_homepod_siri.yaml
# 2. 在 configuration.yaml 中启用 packages：
#      homeassistant:
#        packages: !include_dir_named packages
# 3. 修改下面的 person/media_player/tts 实体为你自己的实体
# 4. 重启 HA
# 5. 通过 HomeKit Bridge 将 input_boolean.vds_siri_unlock_request 暴露到 Apple 家庭
# 6. 在 Apple 家庭里把它命名成“门禁开锁”，之后可以对 HomePod 说：
#      嘿 Siri，打开门禁开锁

input_boolean:
  vds_siri_unlock_request:
    name: 门禁开锁
    icon: mdi:door-open

automation:
  - id: vds_homepod_call_announcement
    alias: 云海湾门禁 - HomePod 来电播报
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.vds_call_status
        from: "off"
        to: "on"
    condition:
      - condition: template
        value_template: >-
          {{ expand([
               'person.hua_zai',
               'person.pai_pai'
             ])
             | selectattr('state', 'eq', 'home')
             | list
             | count > 0 }}
    action:
      - variables:
          homepod_entity: media_player.homepod_mini
          tts_entity: tts.home_assistant_cloud
          previous_volume: "{{ state_attr(homepod_entity, 'volume_level') }}"
      - service: media_player.volume_set
        target:
          entity_id: "{{ homepod_entity }}"
        data:
          volume_level: 0.55
      - service: tts.speak
        target:
          entity_id: "{{ tts_entity }}"
        data:
          media_player_entity_id: "{{ homepod_entity }}"
          message: 有人来了，是否开门？
          cache: true
      - delay: "00:00:04"
      - condition: template
        value_template: "{{ previous_volume is not none }}"
      - service: media_player.volume_set
        target:
          entity_id: "{{ homepod_entity }}"
        data:
          volume_level: "{{ previous_volume | float(0.5) }}"

  - id: vds_siri_unlock_request
    alias: 云海湾门禁 - Siri 开门请求
    mode: single
    trigger:
      - platform: state
        entity_id: input_boolean.vds_siri_unlock_request
        to: "on"
    action:
      - variables:
          target_ip: "{{ state_attr('binary_sensor.vds_call_status', 'target_ip') }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_ip not in [none, ''] }}"
            sequence:
              - service: uppercoast_doorlock.unlock
                data:
                  target_ip: "{{ target_ip }}"
        default:
          - service: persistent_notification.create
            data:
              title: 门禁开锁失败
              message: 当前没有活动门口机呼叫，无法通过 Siri 开锁。
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.vds_siri_unlock_request
