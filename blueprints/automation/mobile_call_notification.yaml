blueprint:
  name: 云海湾门禁来电通知
  description: 门口机呼叫时向 Home Assistant 手机 App 推送基础通知。新版 notify 实体不支持动作按钮扩展，接听/解锁/挂断请进入门禁卡片操作。
  domain: automation
  input:
    call_sensor:
      name: 门禁呼叫状态实体
      description: 默认使用集成创建的 binary_sensor.vds_call_status。实体变为 on 时会推送来电通知。
      default: binary_sensor.vds_call_status
      selector:
        entity:
          domain: binary_sensor
    notify_entity:
      name: 手机通知实体
      description: 选择开发者工具状态页里看到的实体，例如 notify.iphone_air。每台手机各创建一条自动化即可。
      selector:
        entity:
          domain: notify

mode: parallel
max: 10

trigger:
  - platform: state
    entity_id: !input call_sensor
    from: "off"
    to: "on"
    id: call_started
  - platform: state
    entity_id: !input call_sensor
    from: "on"
    to: "off"
    id: call_ended
  - platform: event
    event_type: uppercoast_doorlock_call_started
    id: call_started
  - platform: event
    event_type: uppercoast_doorlock_call_ended
    id: call_ended
  - platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: UPPERCOAST_DOORLOCK_UNLOCK
    id: unlock
  - platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: UPPERCOAST_DOORLOCK_HANGUP
    id: hangup

variables:
  call_sensor: !input call_sensor
  notify_entity: !input notify_entity
  target_ip: >-
    {{ trigger.event.data.action_data.target_ip if trigger.platform == 'event' and trigger.event.data.action_data is defined else
       trigger.event.data.target_ip if trigger.platform == 'event' and trigger.event.data.target_ip is defined else
       state_attr(call_sensor, 'target_ip')
       | default(state_attr('binary_sensor.vds_call_status', 'target_ip'), true) }}
  caller_name: >-
    {{ trigger.event.data.display_name if trigger.platform == 'event' and trigger.event.data.display_name is defined else
       trigger.event.data.device_name if trigger.platform == 'event' and trigger.event.data.device_name is defined else
       state_attr(call_sensor, 'display_name')
       | default('门口机', true) }}

action:
  - choose:
      - conditions:
          - condition: trigger
            id: call_started
        sequence:
          - service: notify.send_message
            data:
              entity_id: !input notify_entity
              title: 门禁呼叫
              message: "{{ caller_name }} 正在呼叫，请打开 Home Assistant 门禁页面接听。"

      - conditions:
          - condition: trigger
            id: call_ended
        sequence:
          - service: notify.send_message
            data:
              entity_id: !input notify_entity
              title: 门禁呼叫结束
              message: "{{ caller_name }} 呼叫已结束"

      - conditions:
          - condition: trigger
            id: unlock
        sequence:
          - service: uppercoast_doorlock.unlock
            data:
              target_ip: "{{ target_ip }}"

      - conditions:
          - condition: trigger
            id: hangup
        sequence:
          - service: uppercoast_doorlock.hangup
            data:
              target_ip: "{{ target_ip }}"
