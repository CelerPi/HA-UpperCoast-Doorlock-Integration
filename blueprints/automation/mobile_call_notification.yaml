blueprint:
  name: 云海湾门禁来电通知
  description: 门口机呼叫时向 Home Assistant 手机 App 推送通知，并提供打开画面、解锁和挂断按钮。
  domain: automation
  input:
    notify_service:
      name: 手机通知服务
      description: 例如 notify.mobile_app_iphone 或 notify.mobile_app_pixel。iOS 和 Android 都使用 mobile_app 通知服务。
      selector:
        text:
    dashboard_uri:
      name: 打开画面的地址
      description: 通知里的“打开画面”按钮会跳转到这个 HA App 内部地址。
      default: /dashboard-unknown/0
      selector:
        text:

mode: parallel
max: 10

trigger:
  - platform: event
    event_type: uppercoast_doorlock_call_started
    id: call_started
  - platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: UPPERCOAST_DOORLOCK_UNLOCK
    id: unlock
  - platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: UPPERCOAST_DOORLOCK_HANGUP
    id: hangup

action:
  - choose:
      - conditions:
          - condition: trigger
            id: call_started
        sequence:
          - service: !input notify_service
            data:
              title: 门禁呼叫
              message: >-
                {{ trigger.event.data.display_name or trigger.event.data.device_name or '门口机' }}
                正在呼叫
              data:
                tag: uppercoast_doorlock_call
                group: uppercoast_doorlock
                importance: high
                ttl: 0
                priority: high
                channel: 门禁呼叫
                push:
                  interruption-level: time-sensitive
                actions:
                  - action: URI
                    title: 打开画面
                    uri: !input dashboard_uri
                  - action: UPPERCOAST_DOORLOCK_UNLOCK
                    title: 解锁
                    action_data:
                      target_ip: "{{ trigger.event.data.target_ip }}"
                  - action: UPPERCOAST_DOORLOCK_HANGUP
                    title: 挂断
                    action_data:
                      target_ip: "{{ trigger.event.data.target_ip }}"

      - conditions:
          - condition: trigger
            id: unlock
        sequence:
          - service: uppercoast_doorlock.unlock
            data:
              target_ip: >-
                {{ trigger.event.data.action_data.target_ip
                   | default(state_attr('binary_sensor.vds_call_status', 'target_ip'), true) }}

      - conditions:
          - condition: trigger
            id: hangup
        sequence:
          - service: uppercoast_doorlock.hangup
            data:
              target_ip: >-
                {{ trigger.event.data.action_data.target_ip
                   | default(state_attr('binary_sensor.vds_call_status', 'target_ip'), true) }}
