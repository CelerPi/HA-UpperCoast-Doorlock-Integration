<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>云海湾门禁卡片预览</title>
  <style>
    :root {
      color-scheme: dark;
      --primary-text-color: rgba(255, 255, 255, 0.94);
      --secondary-text-color: rgba(226, 232, 240, 0.66);
      --divider-color: rgba(255, 255, 255, 0.11);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      color: var(--primary-text-color);
      background:
        radial-gradient(circle at 16% 18%, rgba(79, 70, 229, 0.42), transparent 30%),
        radial-gradient(circle at 84% 66%, rgba(14, 165, 233, 0.36), transparent 34%),
        linear-gradient(135deg, #050816, #101827 48%, #020617);
    }

    .page {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 44px 0 56px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--secondary-text-color);
      font-size: 14px;
    }

    .state-tabs {
      display: flex;
      gap: 8px;
      padding: 4px;
      border: 1px solid var(--divider-color);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
    }

    .state-tabs button {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 9px 13px;
      background: transparent;
      color: var(--secondary-text-color);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .state-tabs button.active {
      background: rgba(255, 255, 255, 0.12);
      color: var(--primary-text-color);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: minmax(320px, 430px) 1fr;
      gap: 22px;
      align-items: start;
    }

    .phone-surface {
      padding: 26px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      background:
        linear-gradient(150deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.32)),
        rgba(255, 255, 255, 0.04);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
    }

    .phone-surface.mobile-preview {
      max-width: 390px;
      min-height: 720px;
      margin: 0 auto;
      border-radius: 34px;
      padding: 18px;
    }

    .side-panel {
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.55);
      padding: 20px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .variant-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 16px;
    }

    .mini-card-label {
      margin: 0 0 8px;
      color: var(--secondary-text-color);
      font-size: 12px;
    }

    .spec-list {
      margin: 20px 0 0;
      padding: 0;
      list-style: none;
      color: var(--secondary-text-color);
      font-size: 13px;
      line-height: 1.9;
    }

    doorlock-card {
      display: block;
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: start;
        flex-direction: column;
      }
      .preview-grid,
      .variant-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 420px) {
      .page {
        width: min(100vw - 20px, 1180px);
        padding-top: 22px;
      }
      .phone-surface {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div>
        <h1>云海湾门禁卡片预览</h1>
        <div class="subtitle">这个页面直接加载真实 doorlock-card.js；看到的就是实际卡片组件。</div>
      </div>
      <div class="state-tabs" aria-label="切换状态">
        <button class="active" data-state="idle">在线</button>
        <button data-state="ringing">呼叫中</button>
        <button data-state="answered">通话中</button>
        <button data-state="offline">离线</button>
      </div>
    </div>

    <div class="preview-grid">
      <section class="phone-surface mobile-preview">
        <doorlock-card id="main-card"></doorlock-card>
      </section>

      <aside class="side-panel">
        <div class="panel-title">其他状态预览</div>
        <div class="variant-row">
          <div>
            <p class="mini-card-label">呼叫中</p>
            <doorlock-card data-static-state="ringing"></doorlock-card>
          </div>
          <div>
            <p class="mini-card-label">通话中</p>
            <doorlock-card data-static-state="answered"></doorlock-card>
          </div>
        </div>
        <ul class="spec-list">
          <li>加载文件：<code>../custom_components/uppercoast_doorlock/frontend/doorlock-card.js</code></li>
        <li>预览数据：由本页 mock Home Assistant 实体状态；切到“呼叫中/通话中”会打开真实呼叫弹窗。</li>
          <li>如果这里和 HA 里不同，通常就是 HA 还在用旧版 JS 或浏览器缓存。</li>
        </ul>
      </aside>
    </div>
  </main>

  <script>
    class HaIconMock extends HTMLElement {
      connectedCallback() {
        const icon = this.getAttribute("icon") || "";
        const glyph = icon.includes("cctv") ? "▣" : icon.includes("phone") ? "☎" : "●";
        this.attachShadow({ mode: "open" }).innerHTML = `
          <style>
            :host {
              width: var(--mdc-icon-size, 20px);
              height: var(--mdc-icon-size, 20px);
              display: inline-grid;
              place-items: center;
              font-size: calc(var(--mdc-icon-size, 20px) * 0.76);
              line-height: 1;
              color: currentColor;
            }
          </style>
          <span>${glyph}</span>
        `;
      }
    }

    if (!customElements.get("ha-icon")) {
      customElements.define("ha-icon", HaIconMock);
    }

    window.customCards = [];
  </script>
  <script type="module">
    function defineFallbackCard() {
      if (customElements.get("doorlock-card")) return;

      class DoorlockCardFallback extends HTMLElement {
        constructor() {
          super();
          this.attachShadow({ mode: "open" });
          this._config = {};
          this._callAnswered = false;
        }

        setConfig(config) {
          this._config = config || {};
        }

        set hass(hass) {
          this._hass = hass;
          this._render();
        }

        requestUpdate() {
          this._render();
        }

        _render() {
          const entity = this._hass?.states?.[this._config.entity || "binary_sensor.vds_call_status"];
          const attributes = entity?.attributes || {};
          const isCall = entity?.state === "on";
          const connected = attributes.connection_status !== "disconnected";
          const statusText = isCall ? (this._callAnswered ? "通话中" : "呼叫中") : (connected ? "在线" : "离线");
          const statusClass = isCall ? (this._callAnswered ? "answered" : "active") : (connected ? "online" : "offline");
          const activeText = isCall ? (attributes.display_name || "呼叫中") : "无活动呼叫";
          const count = attributes.device_count || attributes.devices?.length || 0;
          const iconUrl = "../custom_components/uppercoast_doorlock/frontend/assets/icon.png";

          this.shadowRoot.innerHTML = `
            <style>
              :host {
                display: block;
                font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
                --vds-border: rgba(255, 255, 255, 0.11);
                --vds-border-hover: rgba(255, 255, 255, 0.2);
                --vds-text-primary: rgba(255, 255, 255, 0.94);
                --vds-text-secondary: rgba(226, 232, 240, 0.66);
                --vds-text-tertiary: rgba(203, 213, 225, 0.42);
                --vds-blue: #38BDF8;
                --vds-green: #34D399;
                --vds-red: #FB7185;
                --vds-orange: #FBBF24;
              }
              .card {
                background:
                  radial-gradient(circle at 14% 0%, rgba(52, 211, 153, 0.18), transparent 32%),
                  linear-gradient(150deg, rgba(16, 23, 42, 0.96), rgba(11, 16, 31, 0.88));
                border: 1px solid var(--vds-border);
                border-radius: 18px;
                overflow: hidden;
                color: var(--vds-text-primary);
                box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255,255,255,0.08);
              }
              .card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 14px;
                padding: 16px 18px 12px;
                border-bottom: 1px solid var(--vds-border);
              }
              .card-title {
                display: flex;
                align-items: center;
                gap: 12px;
                min-width: 0;
              }
              .card-title-icon {
                width: 36px;
                height: 36px;
                border-radius: 11px;
                overflow: hidden;
                background: linear-gradient(135deg, #34D399, #22C55E);
                box-shadow: 0 10px 24px rgba(34, 197, 94, 0.26);
                flex: 0 0 auto;
              }
              .card-title-icon img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
              }
              .card-title-text {
                font-size: 16px;
                font-weight: 700;
                white-space: nowrap;
              }
              .card-title-sub {
                margin-top: 2px;
                font-size: 12px;
                color: var(--vds-text-secondary);
              }
              .status-badge {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 6px 11px;
                border-radius: 999px;
                font-size: 12px;
                font-weight: 650;
                background: rgba(148, 163, 184, 0.12);
                border: 1px solid var(--vds-border);
                color: var(--vds-text-secondary);
                white-space: nowrap;
              }
              .status-badge.active {
                background: rgba(251, 113, 133, 0.14);
                border-color: rgba(251, 113, 133, 0.28);
                color: var(--vds-red);
              }
              .status-badge.online,
              .status-badge.answered {
                background: rgba(52, 211, 153, 0.14);
                border-color: rgba(52, 211, 153, 0.28);
                color: var(--vds-green);
              }
              .status-badge.offline {
                background: rgba(251, 191, 36, 0.14);
                border-color: rgba(251, 191, 36, 0.28);
                color: var(--vds-orange);
              }
              .status-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: currentColor;
              }
              .main-buttons {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                padding: 14px 16px 16px;
              }
              .main-btn {
                display: flex;
                align-items: center;
                gap: 10px;
                min-height: 62px;
                padding: 13px 12px;
                border: 1px solid var(--vds-border);
                border-radius: 14px;
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.095), rgba(255, 255, 255, 0.045));
                color: var(--vds-text-primary);
              }
              .main-btn-icon {
                width: 34px;
                height: 34px;
                border-radius: 10px;
                display: grid;
                place-items: center;
                flex: 0 0 auto;
                background: rgba(56, 189, 248, 0.14);
                color: var(--vds-blue);
                font-size: 18px;
              }
              .main-btn.monitor .main-btn-icon {
                background: rgba(52, 211, 153, 0.14);
                color: var(--vds-green);
              }
              .main-btn-label {
                display: block;
                font-size: 15px;
                font-weight: 700;
                line-height: 1.15;
              }
              .main-btn-sub {
                display: block;
                margin-top: 3px;
                font-size: 11px;
                color: var(--vds-text-tertiary);
                line-height: 1.2;
              }
              .card-footer {
                display: flex;
                justify-content: space-between;
                gap: 10px;
                padding: 0 18px 15px;
                color: var(--vds-text-tertiary);
                font-size: 11px;
              }
              .card-footer span {
                white-space: nowrap;
              }
              .card-footer strong {
                color: var(--vds-text-secondary);
                font-weight: 650;
              }
            </style>
            <div class="card">
              <div class="card-header">
                <div class="card-title">
                  <div class="card-title-icon"><img src="${iconUrl}" alt=""></div>
                  <div>
                    <div class="card-title-text">云海湾门禁</div>
                    <div class="card-title-sub">${attributes.building_name || "1栋A座"}</div>
                  </div>
                </div>
                <div class="status-badge ${statusClass}">
                  <div class="status-dot"></div>${statusText}
                </div>
              </div>
              <div class="main-buttons">
                <div class="main-btn">
                  <span class="main-btn-icon">☎</span>
                  <span>
                    <span class="main-btn-label">对讲</span>
                    <span class="main-btn-sub">拨号与通话</span>
                  </span>
                </div>
                <div class="main-btn monitor">
                  <span class="main-btn-icon">▣</span>
                  <span>
                    <span class="main-btn-label">监控</span>
                    <span class="main-btn-sub">查看门口机</span>
                  </span>
                </div>
              </div>
              <div class="card-footer">
                <span>门口机 <strong>${count ? `${count} 台` : "—"}</strong></span>
                <span>${connected ? "后端已连接" : "后端未连接"} · ${activeText}</span>
              </div>
            </div>
          `;
        }
      }

      customElements.define("doorlock-card", DoorlockCardFallback);
    }

    async function loadDoorlockCard() {
      try {
        await import("../custom_components/uppercoast_doorlock/frontend/doorlock-card.js");
      } catch (error) {
        console.warn("[preview] 真实卡片模块加载失败，使用本地预览兜底。", error);
        defineFallbackCard();
      }
    }

    const devices = Array.from({ length: 8 }, (_, index) => {
      const no = String(index + 1).padStart(2, "0");
      return {
        number: no,
        name: `${index + 1}号机`,
        display_name: `${index + 1}号机`,
        target_ip: `192.168.16.${223 + index}`,
        floor_label: index < 4 ? "1层" : "2层",
        position_detail: `门口机 ${index + 1}`,
      };
    });

    const states = {
      idle: {
        entityState: "off",
        callAnswered: false,
        connectionStatus: "connected",
        displayName: "",
        targetIp: "",
      },
      ringing: {
        entityState: "on",
        callAnswered: false,
        connectionStatus: "connected",
        displayName: "2号机",
        targetIp: "192.168.16.224",
      },
      answered: {
        entityState: "on",
        callAnswered: true,
        connectionStatus: "connected",
        displayName: "2号机",
        targetIp: "192.168.16.224",
      },
      offline: {
        entityState: "off",
        callAnswered: false,
        connectionStatus: "disconnected",
        displayName: "",
        targetIp: "",
      },
    };

    function mockHass(stateName) {
      const state = states[stateName];
      return {
        states: {
          "binary_sensor.vds_call_status": {
            state: state.entityState,
            attributes: {
              building_name: "1栋A座",
              devices,
              device_count: devices.length,
              connection_status: state.connectionStatus,
              display_name: state.displayName,
              target_ip: state.targetIp,
              floor_label: state.targetIp ? "1层" : "",
              position_detail: state.targetIp ? "大堂门口" : "",
            },
          },
          "camera.vds_video": {
            state: "idle",
            attributes: {
              entity_picture: "./call-frame.svg",
            },
          },
        },
        connection: {
          options: {
            auth: {
              accessToken: "preview-token",
            },
          },
        },
        callService(domain, service, data) {
          console.log("[preview] callService", domain, service, data || {});
        },
      };
    }

    function configureCard(card, stateName, options = {}) {
      card.setConfig({
        entity: "binary_sensor.vds_call_status",
        camera_entity: "camera.vds_video",
      });
      card._wsUnavailable = true;
      card.hass = mockHass(stateName);
      card._callAnswered = states[stateName].callAnswered;
      card._showCallPopup = options.showPopup && states[stateName].entityState === "on";
      card._callMinimized = false;
      card._showMonitorSelector = false;
      card._showMonitorVideo = false;
      card.requestUpdate();
    }

    await loadDoorlockCard();
    await customElements.whenDefined("doorlock-card");

    const mainCard = document.querySelector("#main-card");
    configureCard(mainCard, "idle", { showPopup: true });

    document.querySelectorAll("[data-static-state]").forEach((card) => {
      configureCard(card, card.dataset.staticState);
    });

    document.querySelectorAll(".state-tabs button").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".state-tabs button").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        configureCard(mainCard, button.dataset.state, { showPopup: true });
      });
    });
  </script>
</body>
</html>
