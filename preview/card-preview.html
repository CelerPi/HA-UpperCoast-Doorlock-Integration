<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>云海湾门禁卡片预览</title>
  <style>
    :root {
      color-scheme: dark;
      --primary-text-color: rgba(255, 255, 255, 0.94);
      --secondary-text-color: rgba(226, 232, 240, 0.66);
      --divider-color: rgba(255, 255, 255, 0.11);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      color: var(--primary-text-color);
      background:
        radial-gradient(circle at 16% 18%, rgba(79, 70, 229, 0.42), transparent 30%),
        radial-gradient(circle at 84% 66%, rgba(14, 165, 233, 0.36), transparent 34%),
        linear-gradient(135deg, #050816, #101827 48%, #020617);
    }

    .page {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 44px 0 56px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--secondary-text-color);
      font-size: 14px;
    }

    .state-tabs {
      display: flex;
      gap: 8px;
      padding: 4px;
      border: 1px solid var(--divider-color);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
    }

    .state-tabs button {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 9px 13px;
      background: transparent;
      color: var(--secondary-text-color);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .state-tabs button.active {
      background: rgba(255, 255, 255, 0.12);
      color: var(--primary-text-color);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: minmax(320px, 430px) 1fr;
      gap: 22px;
      align-items: start;
    }

    .phone-surface {
      padding: 26px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      background:
        linear-gradient(150deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.32)),
        rgba(255, 255, 255, 0.04);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
    }

    .side-panel {
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.55);
      padding: 20px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .variant-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 16px;
    }

    .mini-card-label {
      margin: 0 0 8px;
      color: var(--secondary-text-color);
      font-size: 12px;
    }

    .spec-list {
      margin: 20px 0 0;
      padding: 0;
      list-style: none;
      color: var(--secondary-text-color);
      font-size: 13px;
      line-height: 1.9;
    }

    doorlock-card {
      display: block;
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: start;
        flex-direction: column;
      }
      .preview-grid,
      .variant-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 420px) {
      .page {
        width: min(100vw - 20px, 1180px);
        padding-top: 22px;
      }
      .phone-surface {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div>
        <h1>云海湾门禁卡片预览</h1>
        <div class="subtitle">这个页面直接加载真实 doorlock-card.js；看到的就是实际卡片组件。</div>
      </div>
      <div class="state-tabs" aria-label="切换状态">
        <button class="active" data-state="idle">在线</button>
        <button data-state="ringing">呼叫中</button>
        <button data-state="answered">通话中</button>
        <button data-state="offline">离线</button>
      </div>
    </div>

    <div class="preview-grid">
      <section class="phone-surface">
        <doorlock-card id="main-card"></doorlock-card>
      </section>

      <aside class="side-panel">
        <div class="panel-title">其他状态预览</div>
        <div class="variant-row">
          <div>
            <p class="mini-card-label">呼叫中</p>
            <doorlock-card data-static-state="ringing"></doorlock-card>
          </div>
          <div>
            <p class="mini-card-label">通话中</p>
            <doorlock-card data-static-state="answered"></doorlock-card>
          </div>
        </div>
        <ul class="spec-list">
          <li>加载文件：<code>../custom_components/uppercoast_doorlock/frontend/doorlock-card.js</code></li>
          <li>预览数据：由本页 mock Home Assistant 实体状态。</li>
          <li>如果这里和 HA 里不同，通常就是 HA 还在用旧版 JS 或浏览器缓存。</li>
        </ul>
      </aside>
    </div>
  </main>

  <script>
    class HaIconMock extends HTMLElement {
      connectedCallback() {
        const icon = this.getAttribute("icon") || "";
        const glyph = icon.includes("cctv") ? "▣" : icon.includes("phone") ? "☎" : "●";
        this.attachShadow({ mode: "open" }).innerHTML = `
          <style>
            :host {
              width: var(--mdc-icon-size, 20px);
              height: var(--mdc-icon-size, 20px);
              display: inline-grid;
              place-items: center;
              font-size: calc(var(--mdc-icon-size, 20px) * 0.76);
              line-height: 1;
              color: currentColor;
            }
          </style>
          <span>${glyph}</span>
        `;
      }
    }

    if (!customElements.get("ha-icon")) {
      customElements.define("ha-icon", HaIconMock);
    }

    window.customCards = [];
  </script>
  <script type="module">
    import "../custom_components/uppercoast_doorlock/frontend/doorlock-card.js";

    const devices = Array.from({ length: 8 }, (_, index) => {
      const no = String(index + 1).padStart(2, "0");
      return {
        number: no,
        name: `${index + 1}号机`,
        display_name: `${index + 1}号机`,
        target_ip: `192.168.16.${223 + index}`,
        floor_label: index < 4 ? "1层" : "2层",
        position_detail: `门口机 ${index + 1}`,
      };
    });

    const states = {
      idle: {
        entityState: "off",
        callAnswered: false,
        connectionStatus: "connected",
        displayName: "",
        targetIp: "",
      },
      ringing: {
        entityState: "on",
        callAnswered: false,
        connectionStatus: "connected",
        displayName: "2号机",
        targetIp: "192.168.16.224",
      },
      answered: {
        entityState: "on",
        callAnswered: true,
        connectionStatus: "connected",
        displayName: "2号机",
        targetIp: "192.168.16.224",
      },
      offline: {
        entityState: "off",
        callAnswered: false,
        connectionStatus: "disconnected",
        displayName: "",
        targetIp: "",
      },
    };

    function mockHass(stateName) {
      const state = states[stateName];
      return {
        states: {
          "binary_sensor.vds_call_status": {
            state: state.entityState,
            attributes: {
              building_name: "1栋A座",
              devices,
              device_count: devices.length,
              connection_status: state.connectionStatus,
              display_name: state.displayName,
              target_ip: state.targetIp,
              floor_label: state.targetIp ? "1层" : "",
              position_detail: state.targetIp ? "大堂门口" : "",
            },
          },
          "camera.vds_video": {
            state: "idle",
            attributes: {},
          },
        },
        connection: {
          options: {
            auth: {
              accessToken: "preview-token",
            },
          },
        },
        callService(domain, service, data) {
          console.log("[preview] callService", domain, service, data || {});
        },
      };
    }

    function configureCard(card, stateName) {
      card.setConfig({
        entity: "binary_sensor.vds_call_status",
        camera_entity: "camera.vds_video",
      });
      card._wsUnavailable = true;
      card.hass = mockHass(stateName);
      card._callAnswered = states[stateName].callAnswered;
      card._showCallPopup = false;
      card._showMonitorSelector = false;
      card._showMonitorVideo = false;
      card.requestUpdate();
    }

    await customElements.whenDefined("doorlock-card");

    const mainCard = document.querySelector("#main-card");
    configureCard(mainCard, "idle");

    document.querySelectorAll("[data-static-state]").forEach((card) => {
      configureCard(card, card.dataset.staticState);
    });

    document.querySelectorAll(".state-tabs button").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".state-tabs button").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        configureCard(mainCard, button.dataset.state);
      });
    });
  </script>
</body>
</html>
