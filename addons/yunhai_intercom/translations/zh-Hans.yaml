configuration:
  local_ip:
    name: 门禁网本机 IP
    description: HA 主机在门禁网络中的 IP 地址，必须真实配置在 HA 主机网卡上。
  local_id:
    name: 房号室内机 ID
    description: 虚拟室内机 ID，例如 1栋A座1601 当前使用 00010116010。
  building_id:
    name: 楼栋
    description: 选择当前房屋所在楼栋，门口机会按楼栋预设自动生成。
  center_ip:
    name: 中心地址
    description: 小区中心机 IP 地址。
  property_center_ip:
    name: 物业中心机地址
    description: 物业中心机 IP 地址。
  api_host:
    name: API 监听地址
    description: HTTP API 监听地址，通常保持 0.0.0.0。
  api_port:
    name: API 监听端口
    description: HTTP API 监听端口，默认 8099。
  api_token:
    name: API 访问令牌
    description: 接听、解锁等动作接口使用的 Bearer token。为空时动作接口不可用。
  door_01_ip:
    name: 1号机 IP 覆盖
    description: 留空使用楼栋预设；填写后覆盖 1号机 IP。
  door_02_ip:
    name: 2号机 IP 覆盖
    description: 留空使用楼栋预设；填写后覆盖 2号机 IP。
  door_03_ip:
    name: 3号机 IP 覆盖
    description: 留空使用楼栋预设；填写后覆盖 3号机 IP。
  door_04_ip:
    name: 4号机 IP 覆盖
    description: 留空使用楼栋预设；填写后覆盖 4号机 IP。
  door_05_ip:
    name: 5号机 IP 覆盖
    description: 留空使用楼栋预设；填写后覆盖 5号机 IP。2栋C座 5号机目前可先留空。
  door_06_ip:
    name: 6号机 IP 覆盖
    description: 留空使用楼栋预设；填写后覆盖 6号机 IP。
  door_07_ip:
    name: 7号机 IP 覆盖
    description: 留空使用楼栋预设；填写后覆盖 7号机 IP。
  door_08_ip:
    name: 8号机 IP 覆盖
    description: 留空使用楼栋预设；填写后覆盖 8号机 IP。
